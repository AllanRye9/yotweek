name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Syntax check
        run: python -c "import py_compile; py_compile.compile('api/app.py', doraise=True)"

      - name: Run unit tests
        run: python -m pytest tests/ -v

  youtube-bot-check:
    name: YouTube bot-detection check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # This job checks whether YouTube bot-detection is currently blocking
    # yt-dlp.  A bot-detection hit is an external service issue, NOT a code
    # defect, so the job is allowed to fail without blocking the overall CI.
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install yt-dlp

      - name: Check YouTube reachability
        run: |
          python - <<'EOF'
          import sys
          import yt_dlp

          # A well-known, short public-domain YouTube video (Big Buck Bunny trailer).
          TEST_URL = "https://www.youtube.com/watch?v=aqz-KE-bpKQ"

          BOT_PATTERNS = (
              "sign in to confirm",
              "confirm you're not a bot",
              "login required",
              "please sign in",
              "sign in to view",
              "session has been invalidated",
              "required to log in",
              "use --cookies",
              "requires authentication",
              "not authenticated",
          )

          ydl_opts = {
              "quiet": True,
              "no_warnings": True,
              "skip_download": True,
              "extract_flat": False,
              "extractor_args": {
                  "youtube": {"player_client": ["web_embedded", "tv"]}
              },
          }

          try:
              with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                  info = ydl.extract_info(TEST_URL, download=False)
              title = (info or {}).get("title", "<unknown>")
              print(f"✅  YouTube reachable — fetched: {title!r}")
              sys.exit(0)
          except Exception as exc:
              msg = str(exc).lower()
              if any(p in msg for p in BOT_PATTERNS):
                  # Bot-detection is an external service condition, NOT a code
                  # defect.  Report the finding clearly and exit 0 so the step
                  # stays green; the warning text is enough to alert maintainers.
                  print(
                      "⚠️  YouTube bot-detection is active.\n"
                      "   Downloads may fail until the block is lifted.\n"
                      f"   yt-dlp error: {exc}"
                  )
                  sys.exit(0)
              else:
                  print(f"❌  Unexpected error fetching YouTube info: {exc}")
                  sys.exit(1)
          EOF

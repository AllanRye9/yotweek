name: Test Document Converter

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-doc-converter:
    name: Unit tests – document converter
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run document-converter tests
        run: python -m pytest tests/ -v --tb=short

name: Migrations

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: python -c "from api.app import init_db; init_db()"
